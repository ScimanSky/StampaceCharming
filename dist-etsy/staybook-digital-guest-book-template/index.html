<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StayBook</title>
    <meta
      name="description"
      content="Five-language digital guest book with house rules, Wi-Fi, useful stay info and local tips."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <div class="app-shell">
      <aside class="preview-banner" id="preview-banner" hidden>
        <span id="preview-banner-copy"></span>
        <a href="./customize.html" id="preview-banner-link">Back to editor</a>
      </aside>

      <header class="topbar card-surface">
        <div class="brand-line">
          <span class="brand-seal" id="brand-seal">CO</span>
          <div>
            <p class="eyebrow" id="property-badge">Digital guest book</p>
            <h1 class="brand-name" id="property-name-small">Casa Oliva</h1>
          </div>
        </div>

        <div class="topbar-actions">
          <div class="locale-switch" id="locale-switch"></div>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color mode"></button>
        </div>
      </header>

      <main class="page">
        <section class="hero card-surface">
          <div class="hero-copy hero-copy-centered">
            <p class="eyebrow" id="hero-kicker">Guest book</p>
            <h2 class="hero-title" id="hero-title">Casa Oliva</h2>
            <p class="hero-subtitle" id="hero-subtitle"></p>
            <article class="hero-visual hero-visual-centered card-panel">
              <div class="hero-image-wrap" id="hero-image-wrap" hidden>
                <img id="hero-image" alt="" />
              </div>
              <div class="hero-fallback" id="hero-fallback">
                <span class="stamp-circle" id="fallback-seal">CO</span>
                <p id="hero-fallback-copy"></p>
              </div>
            </article>
          </div>
        </section>

        <section class="section-intro">
          <div>
            <p class="eyebrow" id="section-intro-kicker">Guest essentials</p>
          </div>
        </section>

        <section class="section-grid" id="section-grid"></section>

        <section class="host-section card-surface">
          <div class="host-copy">
            <p class="eyebrow" id="host-label">Hosted by</p>
            <h2 id="host-name-large">Sofia</h2>
            <p id="host-contact-note"></p>
          </div>
          <div class="host-actions" id="host-actions"></div>
        </section>
      </main>
    </div>

    <div class="modal" id="section-modal" hidden>
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-card card-surface" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" type="button" id="modal-close" aria-label="Close details">×</button>
        <p class="eyebrow" id="modal-kicker"></p>
        <h3 id="modal-title"></h3>
        <ul class="modal-list" id="modal-list"></ul>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
