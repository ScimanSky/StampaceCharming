<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wi-Fi Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./printables.css" />
  </head>
  <body class="printable-body">
    <main class="printable-shell printable-shell-card">
      <div class="printable-toolbar">
        <div class="printable-toolbar-copy">
          <strong>Wi-Fi Card</strong>
          <span>Use this as a quick printable card near the entrance or desk.</span>
        </div>
        <div class="printable-toolbar-actions">
          <div class="printable-locale-switch" id="locale-switch"></div>
          <button class="topbar-button" id="print-button" type="button">Print / Save as PDF</button>
        </div>
      </div>

      <section class="printable-card printable-card-compact">
        <div class="printable-header compact-header">
          <div>
            <p class="hero-label" id="hero-label">Guest Wi-Fi</p>
            <h1 id="wifi-title"></h1>
          </div>
          <div class="brand-seal printable-seal" id="sign-crest">GG</div>
        </div>

        <div class="printable-grid printable-grid-card">
          <div class="info-stack">
            <article class="info-card">
              <span class="info-label" id="network-label">Network</span>
              <strong id="wifi-network"></strong>
            </article>
            <article class="info-card">
              <span class="info-label" id="password-label">Password</span>
              <strong id="wifi-password"></strong>
            </article>
            <article class="info-card">
              <span class="info-label" id="property-label">Property</span>
              <strong id="property-name"></strong>
            </article>
          </div>
          <div class="qr-panel qr-panel-card">
            <div class="qr-frame" id="qr-frame"></div>
            <p class="qr-caption" id="wifi-caption">Scan to connect on supported devices</p>
          </div>
        </div>
      </section>
    </main>

    <script src="../vendor/qrcode.js"></script>
    <script type="module" src="./printables.js"></script>
  </body>
</html>
