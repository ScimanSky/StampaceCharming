<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Guest Guide Atelier</title>
    <meta
      name="description"
      content="White-label guest guide template for boutique stays, short-term rentals and hospitality brands."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="texture texture-left" aria-hidden="true"></div>
      <div class="texture texture-right" aria-hidden="true"></div>

      <header class="hero">
        <div class="topbar">
          <div class="brand-lockup">
            <div class="brand-seal" id="brand-seal">GG</div>
            <div>
              <p class="brand-overline">Template edition</p>
              <strong class="brand-name" id="brand-name">Guest Guide Atelier</strong>
            </div>
          </div>

          <div class="topbar-actions">
            <a class="topbar-link" href="./customize.html" id="customizer-link">Customizer</a>
            <button class="topbar-button" id="host-button" type="button">Host</button>
            <div class="locale-switch" id="locale-switch" aria-label="Language switcher"></div>
            <button class="topbar-button" id="theme-toggle" type="button">Theme</button>
          </div>
        </div>

        <div class="hero-grid">
          <section class="hero-card">
            <p class="hero-kicker" id="hero-kicker"></p>
            <h1 class="hero-title" id="hero-title"></h1>
            <p class="hero-copy" id="hero-subtitle"></p>

            <div class="hero-meta">
              <span id="hero-address"></span>
              <span id="hero-email"></span>
              <span id="hero-license"></span>
            </div>

            <p class="hero-welcome" id="hero-welcome"></p>

            <div class="stats-grid" id="stats-grid"></div>
          </section>

          <aside class="preview-rail">
            <div class="preview-card" id="preview-banner" hidden></div>
            <div class="dock-card">
              <p class="dock-title">Quick access</p>
              <div class="quick-dock" id="quick-dock"></div>
            </div>
          </aside>
        </div>
        <div class="hero-image-wrap" id="hero-image-wrap" hidden>
          <img class="hero-image" id="hero-image" src="" alt="" loading="eager" />
        </div>
      </header>

      <main class="page-content">
        <section class="gallery-strip" id="gallery-strip" hidden>
          <div class="gallery-grid" id="gallery-grid"></div>
        </section>
        <section class="section">
          <div class="section-heading">
            <p class="section-kicker" id="services-kicker"></p>
            <h2 class="section-title" id="services-title"></h2>
            <p class="section-copy" id="services-copy"></p>
          </div>
          <div class="services-grid" id="services-grid"></div>
        </section>

        <section class="section section-map">
          <div class="section-heading split-heading">
            <div>
              <p class="section-kicker">Around the stay</p>
              <h2 class="section-title" id="area-title"></h2>
            </div>
            <p class="section-copy narrow-copy" id="area-copy"></p>
          </div>

          <div class="map-layout">
            <div class="map-frame">
              <div class="map-filters" id="map-filters"></div>
              <iframe
                id="area-map"
                title="Neighborhood map"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
              ></iframe>
            </div>
            <div class="map-points" id="map-points"></div>
          </div>
        </section>

        <section class="story-layout">
          <article class="story-card">
            <p class="section-kicker" id="story-kicker"></p>
            <h2 class="section-title" id="story-title"></h2>
            <p class="story-copy" id="story-body"></p>
          </article>

          <article class="notes-card">
            <p class="section-kicker" id="notes-kicker"></p>
            <ul class="notes-list" id="notes-list"></ul>
          </article>
        </section>

        <section class="contact-section">
          <div class="section-heading split-heading">
            <div>
              <p class="section-kicker">On-call support</p>
              <h2 class="section-title" id="contact-title"></h2>
            </div>
            <p class="section-copy narrow-copy" id="contact-copy"></p>
          </div>
          <div class="contacts-grid" id="contacts-grid"></div>
        </section>
      </main>

      <footer class="footer">
        <div>
          <strong id="footer-brand">Guest Guide Atelier</strong>
          <p id="footer-note"></p>
        </div>
        <a class="footer-link" href="./customize.html" data-host-only>Open customizer</a>
      </footer>
    </div>

    <div class="host-sheet hidden" id="host-sheet" aria-hidden="true">
      <button class="sheet-backdrop" id="host-sheet-backdrop" type="button" aria-label="Close"></button>
      <div class="sheet-panel">
        <button class="sheet-close" id="host-sheet-close" type="button" aria-label="Close"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        <div class="sheet-seal" id="sheet-seal">GG</div>
        <p class="sheet-kicker" id="host-sheet-kicker"></p>
        <h3 id="host-sheet-name"></h3>
        <p class="sheet-copy" id="host-sheet-copy"></p>
        <div class="sheet-actions" id="host-sheet-actions"></div>
      </div>
    </div>

    <div class="modal hidden" id="modal" aria-hidden="true">
      <button class="modal-backdrop" id="modal-backdrop" type="button" aria-label="Close"></button>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" id="modal-close" type="button" aria-label="Close"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        <p class="modal-kicker" id="modal-kicker"></p>
        <h3 class="modal-title" id="modal-title"></h3>
        <p class="modal-copy" id="modal-copy"></p>
        <div class="modal-sections" id="modal-sections"></div>
      </div>
    </div>

    <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
