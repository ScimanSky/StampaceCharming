<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Stampace Charming</title>
    <meta
      name="description"
      content="Guest guide multilingua per appartamenti, case vacanza e boutique stay."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <header class="hero">
        <div class="topbar">
          <div class="topbar-controls">
            <div class="lang-switch-wrap">
              <div class="lang-switch" id="lang-switch" aria-label="Language switcher"></div>
            </div>
            <button class="theme-toggle" id="theme-toggle" type="button"></button>
          </div>
        </div>

        <div class="hero-card hero-cover" id="hero-card">
          <div class="crest" aria-hidden="true">SC</div>
          <p class="eyebrow" id="hero-kicker"></p>
          <h1 id="hero-title"></h1>
          <p class="hero-subtitle" id="hero-subtitle"></p>

          <div class="hero-meta">
            <span id="hero-address"></span>
            <span id="hero-mail"></span>
            <span id="hero-license"></span>
          </div>

          <div class="hero-divider"></div>

          <p class="hero-welcome" id="hero-welcome"></p>

          <div class="hero-stats">
            <article class="stat-card">
              <strong id="stat-one-value"></strong>
              <span id="stat-one-label"></span>
            </article>
            <article class="stat-card">
              <strong id="stat-two-value"></strong>
              <span id="stat-two-label"></span>
            </article>
            <article class="stat-card">
              <strong id="stat-three-value"></strong>
              <span id="stat-three-label"></span>
            </article>
          </div>
        </div>

        <div class="quick-dock" id="quick-dock" aria-label="Quick actions"></div>
      </header>

      <main>
        <section class="services">
          <div class="section-heading">
            <p id="services-kicker"></p>
            <h2 id="services-title"></h2>
            <p class="section-copy" id="services-copy"></p>
          </div>

          <div class="service-grid" id="service-grid"></div>
        </section>

        <section class="map-section" id="map-section">
          <div class="section-heading section-heading-compact">
            <h2 id="area-title"></h2>
            <p class="section-copy" id="area-copy"></p>
          </div>
          <div class="map-pills" id="map-pills"></div>
          <div class="map-shell">
            <iframe
              id="area-map"
              title="Neighborhood map"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
          <div class="map-list" id="map-list"></div>
        </section>

        <section class="split-panel">
          <article class="story-panel">
            <p class="panel-kicker" id="story-kicker"></p>
            <h2 id="story-title"></h2>
            <p id="story-body"></p>
          </article>

          <article class="notes-panel">
            <p class="panel-kicker" id="notes-kicker"></p>
            <ul class="notes-list" id="notes-list"></ul>
          </article>
        </section>
      </main>

      <footer class="footer">
        <div>
          <strong>Stampace Charming</strong>
          <span id="footer-copy"></span>
        </div>
        <button class="ghost-button" id="footer-contact"></button>
      </footer>
    </div>

    <div class="modal hidden" id="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close="true"></div>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" id="modal-close" type="button" aria-label="Close">
          <span aria-hidden="true">+</span>
        </button>
        <div class="modal-header">
          <div class="modal-icon" id="modal-icon" aria-hidden="true"></div>
          <p class="modal-kicker" id="modal-kicker"></p>
          <h3 id="modal-title"></h3>
          <p class="modal-copy" id="modal-copy"></p>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
